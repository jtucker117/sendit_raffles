name: CI

# Build-check the Expo app in the cloud on every push/PR (no local Node needed).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck and web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Expo Doctor (advisory)
        run: npx expo-doctor || true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Web build
        run: npx expo export -p web
